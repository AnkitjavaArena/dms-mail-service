<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Enroll Report</title>
    <style>
        body {
            font-family: "DejaVu Sans", Arial, sans-serif;
            margin: 30px;
            font-size: 12px;
            color: #333333;
            background-color: #ffffff;
        }

        h1 {
            color: #1a73e8;
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #1a73e8;
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        thead tr {
            background-color: #1a73e8;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f7faff;
        }

        tbody tr:hover {
            background-color: #eaf2ff;
        }

        th {
            font-weight: bold;
            font-size: 13px;
        }

        td {
            font-size: 12px;
        }

        /* Footer style for PDF */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 10px;
            color: #777;
            border-top: 1px solid #ccc;
            padding-top: 8px;
        }

        /* Add small table border radius effect (compatible) */
        table, th, td {
            border-radius: 3px;
        }
    </style>
</head>
<body>
<h1>Email Report</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Recipient</th>
        <th>Salutation</th>
        <th>Status</th>
        <th>Count</th>
        <th>Subscribed</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="enroll : ${enrollList}">
        <td th:text="${enroll.id}"></td>
        <td th:text="${enroll.to}"></td>
        <td th:text="${enroll.salutation}"></td>
        <td th:text="${enroll.status}"></td>
        <td th:text="${enroll.count}"></td>
        <td th:text="${enroll.subscribe ? 'Yes' : 'No'}"></td>
    </tr>
    </tbody>
</table>

<div class="footer">
    Generated on <span th:text="${#temporals.format(generatedOn, 'dd MMM yyyy HH:mm')}"></span>
</div>

</body>
</html>
